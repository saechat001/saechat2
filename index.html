<script src="https://cdn.ably.io/lib/ably.min-1.js"></script>
<script>
let currentUser = '';
const channelName = 'saechat-group';
let ably;

function login(){
  currentUser = document.getElementById('username').value.trim();
  if(!currentUser){alert('Enter username'); return;}
  document.getElementById('loginDiv').style.display='none';
  document.getElementById('chatDiv').style.display='';
  
  // Connect to Ably
  ably = new Ably.Realtime(zFU24w.ickmyA:EZkgpmZcM_f3FCfO_r494Z67DEGq8jKefIp9GOGfNZU');
  const channel = ably.channels.get(channelName);

  // Listen for messages
  channel.subscribe(function(msg){
    addMessage(msg.data.user, msg.data.text);
  });
  
  window.sendMessage = function(){
    const text = document.getElementById('msgInput').value.trim();
    if(!text) return;
    channel.publish('chat', {user: currentUser, text});
    document.getElementById('msgInput').value='';
  };
}

function addMessage(user, text){
  const chat = document.getElementById('chat');
  const cls = user===currentUser ? 'mine':'theirs';
  chat.innerHTML += `<div class="msg ${cls}"><b>${user}:</b> ${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}
</script>
