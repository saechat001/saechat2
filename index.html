<!DOCTYPE html>
<html>
<head>
<title>SaeChat Simple</title>
<style>
body{background:#111;color:#eee;font-family:sans-serif;padding:10px;}
#chat{height:400px;overflow-y:auto;background:#222;padding:10px;border-radius:6px;margin-bottom:8px;}
input{width:100%;padding:8px;margin:4px 0;border-radius:4px;border:none;background:#333;color:#eee;}
button{width:100%;padding:8px;border:none;border-radius:4px;background:#555;color:#eee;cursor:pointer;}
.msg{padding:4px;margin:2px 0;}
.mine{text-align:right;color:#0af;}
.theirs{text-align:left;}
</style>
</head>
<body>
<h1>SaeChat</h1>
<div id="loginDiv">
<input id="username" placeholder="Enter username">
<button onclick="login()">Login</button>
</div>

<div id="chatDiv" style="display:none;">
<div id="chat"></div>
<input id="msgInput" placeholder="Type a message">
<button onclick="sendMessage()">Send</button>
</div>

<script>
let currentUser='';
let messages=[];

function login(){
currentUser=document.getElementById('username').value.trim();
if(!currentUser){alert('Enter username');return;}
document.getElementById('loginDiv').style.display='none';
document.getElementById('chatDiv').style.display='';
renderMessages();
}

function sendMessage(){
const text=document.getElementById('msgInput').value.trim();
if(!text)return;
messages.push({user:currentUser,text});
document.getElementById('msgInput').value='';
renderMessages();
}

function renderMessages(){
const chat=document.getElementById('chat');chat.innerHTML='';
messages.forEach(m=>{
const cls=m.user===currentUser?'mine':'theirs';
chat.innerHTML+='<div class="msg '+cls+'"><b>'+m.user+':</b> '+m.text+'</div>';
});
chat.scrollTop=chat.scrollHeight;
}
</script>
</body>
</html>
